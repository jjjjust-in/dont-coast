<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Post Update</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;500;600&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ece9e3;
      --fg: #1c1c1c;
      --border: #bfbab0;
      --muted: #888;
      --accent: #1c1c1c;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inconsolata', monospace;
      font-size: 15px;
      line-height: 1.6;
      padding: 32px 20px 80px;
      max-width: 540px;
      margin: 0 auto;
    }

    h1 {
      font-family: 'Work Sans', sans-serif;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.5px;
      margin-bottom: 28px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 24px 0 10px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input, textarea {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 12px;
      font-family: 'Inconsolata', monospace;
      font-size: 15px;
      color: var(--fg);
      width: 100%;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    input:focus, textarea:focus {
      border-color: var(--fg);
    }

    .bullets-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bullet-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bullet-row::before {
      content: '—';
      color: var(--muted);
      flex-shrink: 0;
    }

    .bullet-row input {
      flex: 1;
    }

    .bullet-remove {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
    }

    .btn-add {
      background: none;
      border: 1px dashed var(--border);
      border-radius: 4px;
      padding: 8px 14px;
      font-family: 'Inconsolata', monospace;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      margin-top: 8px;
      width: 100%;
    }

    .btn-add:active { opacity: 0.6; }

    /* Photos */
    .photo-label {
      display: block;
      border: 1px dashed var(--border);
      border-radius: 4px;
      padding: 14px;
      text-align: center;
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
    }

    .photo-label:active { opacity: 0.6; }

    #photoInput { display: none; }

    .photo-previews {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .photo-thumb-wrap {
      position: relative;
      width: 72px;
      height: 72px;
    }

    .photo-thumb-wrap img {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .photo-thumb-remove {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--fg);
      color: var(--bg);
      border: none;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    /* Token */
    .token-wrap {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    /* Submit */
    .btn-submit {
      display: block;
      width: 100%;
      margin-top: 28px;
      padding: 16px;
      background: var(--fg);
      color: var(--bg);
      border: none;
      border-radius: 4px;
      font-family: 'Work Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
    }

    .btn-submit:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #progress-wrap {
      display: none;
      margin-top: 16px;
    }

    #progress-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    #progress-bar-track {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    #progress-bar-fill {
      height: 100%;
      background: var(--fg);
      border-radius: 2px;
      width: 0%;
      transition: width 0.2s ease;
    }

    #status {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
      color: var(--muted);
    }

    #status.error { color: #c0392b; }
    #status.success { color: #27ae60; }
  </style>
</head>
<body>

  <h1>Ride Journal</h1>

  <div class="section-label">Day Stats</div>
  <div class="grid-2">
    <div class="field">
      <label>Start</label>
      <input type="text" id="startLocation" placeholder="Banff, AB" />
    </div>
    <div class="field">
      <label>End</label>
      <input type="text" id="endLocation" placeholder="Eureka, MT" />
    </div>
    <div class="field">
      <label>Miles</label>
      <input type="number" id="miles" placeholder="131" inputmode="decimal" />
    </div>
    <div class="field">
      <label>Elevation (ft)</label>
      <input type="number" id="elevation" placeholder="9200" inputmode="decimal" />
    </div>
    <div class="field">
      <label>Start Time</label>
      <input type="text" id="startTime" placeholder="8:00 AM" />
    </div>
    <div class="field">
      <label>End Time</label>
      <input type="text" id="endTime" placeholder="9:45 PM" />
    </div>
  </div>

  <div class="section-label">Notes</div>
  <div class="bullets-list" id="bulletsList">
    <div class="bullet-row">
      <input type="text" placeholder="Add a note…" />
    </div>
    <div class="bullet-row">
      <input type="text" placeholder="Add a note…" />
    </div>
  </div>
  <button class="btn-add" id="addBullet">+ Add line</button>

  <div class="section-label">Photos</div>
  <label class="photo-label" for="photoInput">Tap to select photos</label>
  <input type="file" id="photoInput" accept="image/*" multiple />
  <div class="photo-previews" id="photoPreviews"></div>

  <div class="token-wrap">
    <div class="field">
      <label>Auth Token</label>
      <input type="password" id="token" placeholder="••••••••" autocomplete="current-password" />
    </div>
  </div>

  <button class="btn-submit" id="submitBtn">Send Update</button>
  <div id="progress-wrap">
    <div id="progress-label">Preparing…</div>
    <div id="progress-bar-track"><div id="progress-bar-fill"></div></div>
  </div>
  <div id="status"></div>

  <script>
    // Persist token in localStorage
    const tokenInput = document.getElementById('token');
    tokenInput.value = localStorage.getItem('dc_token') || '';
    tokenInput.addEventListener('change', () => localStorage.setItem('dc_token', tokenInput.value));

    // Add bullet
    document.getElementById('addBullet').addEventListener('click', () => {
      const row = document.createElement('div');
      row.className = 'bullet-row';
      row.innerHTML = `<input type="text" placeholder="Add a note…" /><button class="bullet-remove" aria-label="Remove">×</button>`;
      row.querySelector('.bullet-remove').addEventListener('click', () => row.remove());
      document.getElementById('bulletsList').appendChild(row);
      row.querySelector('input').focus();
    });

    // Photo picker
    const selectedFiles = [];
    document.getElementById('photoInput').addEventListener('change', e => {
      [...e.target.files].forEach(file => {
        selectedFiles.push(file);
        const wrap = document.createElement('div');
        wrap.className = 'photo-thumb-wrap';
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        const rm = document.createElement('button');
        rm.className = 'photo-thumb-remove';
        rm.textContent = '×';
        rm.addEventListener('click', () => {
          const idx = selectedFiles.indexOf(file);
          if (idx > -1) selectedFiles.splice(idx, 1);
          wrap.remove();
        });
        wrap.appendChild(img);
        wrap.appendChild(rm);
        document.getElementById('photoPreviews').appendChild(wrap);
      });
      e.target.value = '';
    });

    function compressImage(file, maxPx = 1800, quality = 0.82) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = reject;
        reader.onload = e => {
          const img = new Image();
          img.onerror = reject;
          img.onload = () => {
            let { width, height } = img;
            if (width > maxPx || height > maxPx) {
              if (width > height) { height = Math.round(height * maxPx / width); width = maxPx; }
              else { width = Math.round(width * maxPx / height); height = maxPx; }
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            const data = canvas.toDataURL('image/jpeg', quality).split(',')[1];
            resolve({ data, type: 'image/jpeg' });
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    const progressWrap = document.getElementById('progress-wrap');
    const progressLabel = document.getElementById('progress-label');
    const progressFill = document.getElementById('progress-bar-fill');

    function setProgress(pct, label) {
      progressWrap.style.display = 'block';
      progressLabel.textContent = label;
      progressFill.style.width = pct + '%';
    }

    function hideProgress() {
      progressWrap.style.display = 'none';
      progressFill.style.width = '0%';
    }

    // Submit
    document.getElementById('submitBtn').addEventListener('click', async () => {
      const btn = document.getElementById('submitBtn');
      const status = document.getElementById('status');
      const token = tokenInput.value.trim();

      if (!token) { showStatus('Auth token required.', 'error'); return; }

      btn.disabled = true;
      showStatus('', '');

      // Collect bullets
      const lines = [...document.querySelectorAll('#bulletsList input')]
        .map(i => i.value.trim()).filter(Boolean);

      // Encode images with progress
      const total = selectedFiles.length;
      const images = [];
      for (let i = 0; i < total; i++) {
        setProgress(Math.round((i / (total + 1)) * 80), `Encoding photo ${i + 1} of ${total}…`);
        const file = selectedFiles[i];
        const encoded = await compressImage(file);
        images.push(encoded);
      }

      if (total > 0) setProgress(80, 'Uploading…');
      else setProgress(50, 'Sending…');

      const body = {
        text: lines.join('\n'),
        startLocation: document.getElementById('startLocation').value.trim() || null,
        endLocation:   document.getElementById('endLocation').value.trim()   || null,
        miles:         parseFloat(document.getElementById('miles').value)    || null,
        elevation:     parseFloat(document.getElementById('elevation').value) || null,
        startTime:     document.getElementById('startTime').value.trim()     || null,
        endTime:       document.getElementById('endTime').value.trim()       || null,
        images: images.length ? images : undefined,
      };

      try {
        const res = await fetch('/.netlify/functions/post-update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-auth-token': token },
          body: JSON.stringify(body),
        });

        setProgress(100, 'Done.');
        setTimeout(hideProgress, 800);

        if (res.ok) {
          showStatus('Posted.', 'success');
          clearForm();
        } else {
          const txt = await res.text();
          showStatus(`Error ${res.status}: ${txt}`, 'error');
        }
      } catch (err) {
        hideProgress();
        showStatus('Network error. Try again.', 'error');
      }

      btn.disabled = false;
    });

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
    }

    function clearForm() {
      ['startLocation','endLocation','miles','elevation','startTime','endTime']
        .forEach(id => document.getElementById(id).value = '');
      document.querySelectorAll('#bulletsList input').forEach(i => i.value = '');
      // remove added rows, keep first two
      const rows = [...document.querySelectorAll('#bulletsList .bullet-row')];
      rows.slice(2).forEach(r => r.remove());
      selectedFiles.length = 0;
      document.getElementById('photoPreviews').innerHTML = '';
    }
  </script>

</body>
</html>
